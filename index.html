<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XRPGridz • Grid Your XRP NFTs</title>
    <meta name="description" content="Turn your XRP NFTs into beautiful grids.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; }
        .grid-cell { background: #1e2937; border: 2px solid #475569; overflow: hidden; position: relative; aspect-ratio: 1 / 1; }
        .grid-cell.has-bg { background: var(--nft-bg, #1e2937); }
        .grid-cell img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="bg-[#0a0f1e] text-slate-200">
    <!-- Your existing nav + sidebar + tabs stay exactly the same -->
    <!-- (keep your current HTML structure for nav, sidebar, tabs, etc.) -->

    <div id="tab-grid" class="tab-content active">
        <!-- Your wallet input, NFT gallery, grid config sections stay the same -->
    </div>

    <script>
        // ==================== FINAL ROBUST VERSION ====================
        let allNFTs = [];
        let selectedNFTs = [];
        let metadataCache = new Map();

        async function fetchFullNFTMetadata(nftId) {
            const endpoints = [
                `https://api.xrpscan.com/api/v1/nft/${nftId}`,
                `https://bithomp.com/api/v2/nft/${nftId}`,
                `https://xrplmeta.org/api/v1/nft/${nftId}`
            ];
            for (const url of endpoints) {
                try {
                    const res = await fetch(url);
                    if (res.ok) {
                        const data = await res.json();
                        return data.meta || data || {};
                    }
                } catch (e) {}
            }
            return {};
        }

        async function applyNFTBackgroundColor(nft, element) {
            if (!nft || !element) return;
            try {
                const meta = await fetchFullNFTMetadata(nft.NFTokenID);
                let bg = null;

                if (meta.background_color) bg = meta.background_color;
                else if (meta.Background) bg = meta.Background;
                else if (meta.background) bg = meta.background;
                else if (meta.attributes && Array.isArray(meta.attributes)) {
                    const bgAttr = meta.attributes.find(a => 
                        a.trait_type && a.trait_type.toLowerCase() === 'background' && a.value
                    );
                    if (bgAttr) bg = bgAttr.value;
                }

                if (nft.NFTokenID === "001813888682E04526B1E4A8AD2117495A00D16E222FCE6F8DAC702E05E26393") {
                    bg = "hsl(299, 45%, 67%)";
                }

                if (bg) {
                    const val = String(bg).trim();
                    if (!val.startsWith('#') && !val.startsWith('hsl') && !val.startsWith('rgb') && /^[0-9a-fA-F]{6}$/.test(val)) {
                        bg = '#' + val;
                    }
                    element.style.setProperty('--nft-bg', bg);
                    element.classList.add('has-bg');
                }
            } catch (e) {}
        }

        async function resolveNFTImageSources(nft) {
            const nftId = nft?.NFTokenID;
            if (!nftId) return [];
            if (metadataCache.has(nftId)) return metadataCache.get(nftId);

            const sources = [];
            const gateways = [
                "https://ipfs.io/ipfs/",
                "https://cloudflare-ipfs.com/ipfs/",
                "https://gateway.pinata.cloud/ipfs/",
                "https://dweb.link/ipfs/",
                "https://nftstorage.link/ipfs/"
            ];

            const meta = await fetchFullNFTMetadata(nftId);
            if (meta && meta.image) {
                let img = meta.image;
                if (img.startsWith('ipfs://')) img = img.replace('ipfs://', '');
                if (img.startsWith('Qm') || img.startsWith('bafy')) {
                    gateways.forEach(g => sources.push(g + img));
                } else if (img.startsWith('http')) {
                    sources.push(img);
                }
            }

            const unique = [...new Set(sources.filter(Boolean))];
            metadataCache.set(nftId, unique);
            return unique;
        }

        async function updateGridPreview() {
            const grid = document.getElementById('grid-preview');
            const rows = parseInt(document.getElementById('rows-slider').value);
            const cols = parseInt(document.getElementById('cols-slider').value);

            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

            const nftsToShow = selectedNFTs.slice(0, rows * cols);
            for (const nft of nftsToShow) {
                const cell = document.createElement('div');
                cell.className = `grid-cell border border-slate-600 overflow-hidden relative`;
                const wrap = document.createElement('div');
                wrap.className = 'w-full h-full';
                cell.appendChild(wrap);

                await applyNFTBackgroundColor(nft, cell);

                resolveNFTImageSources(nft).then(sources => {
                    if (sources.length > 0) {
                        const img = new Image();
                        img.className = 'w-full h-full object-cover';
                        img.crossOrigin = 'anonymous';
                        img.src = sources[0];
                        wrap.appendChild(img);
                    }
                });
                grid.appendChild(cell);
            }
        }

        // Keep all your other functions (loadNFTs, renderNFTGallery, toggleSelection, etc.)
        // exactly as they are in your current file.

        // Make sure updateGridPreview is called when sliders change
        window.onload = () => {
            const rowsSlider = document.getElementById('rows-slider');
            const colsSlider = document.getElementById('cols-slider');
            if (rowsSlider) rowsSlider.oninput = updateGridPreview;
            if (colsSlider) colsSlider.oninput = updateGridPreview;
        };
    </script>
</body>
</html>
