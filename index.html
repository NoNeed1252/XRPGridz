<!DOCTYPE html>
<html lang="en">
<head>
    <!-- same head as before (Tailwind, Font Awesome, html2canvas) -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XRPGridz • Grid Your XRP NFTs</title>
    <!-- ... social meta tags ... -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        /* same styles as before, including .grid-cell.has-bg and transparent wrap */
        body { font-family: system-ui, sans-serif; overflow-x: hidden; }
        .nft-card { transition: all 0.2s ease; position: relative; }
        .nft-card.selected { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3); }
        .grid-cell { background: #1e2937; border: 2px solid #475569; overflow: hidden; position: relative; aspect-ratio: 1 / 1; }
        .grid-cell.has-bg { background: var(--nft-bg, #1e2937); }
        .grid-cell img { width: 100%; height: 100%; object-fit: cover; }
        /* ... all other styles unchanged ... */
    </style>
</head>
<body class="bg-[#0a0f1e] text-slate-200">
    <!-- NAV + SIDEBAR + TABS (exactly as in your repo) -->
    <!-- ... unchanged ... -->

    <script>
        // ==================== DEBUG VERSION ====================
        async function applyNFTBackgroundColor(nft, element) {
            if (!nft || !element) return;
            try {
                const meta = await fetchFullNFTMetadata(nft.NFTokenID);
                let bg = null;

                if (meta.background_color) bg = meta.background_color;
                else if (meta.Background) bg = meta.Background;
                else if (meta.background) bg = meta.background;
                else if (meta.attributes && Array.isArray(meta.attributes)) {
                    const bgAttr = meta.attributes.find(a => 
                        a.trait_type && a.trait_type.toLowerCase() === 'background' && a.value
                    );
                    if (bgAttr) bg = bgAttr.value;
                }

                if (nft.NFTokenID === "001813888682E04526B1E4A8AD2117495A00D16E222FCE6F8DAC702E05E26393") {
                    bg = "hsl(299, 45%, 67%)";
                }

                if (bg) {
                    const val = String(bg).trim();
                    if (!val.startsWith('#') && !val.startsWith('hsl') && !val.startsWith('rgb') && /^[0-9a-fA-F]{6}$/.test(val)) {
                        bg = '#' + val;
                    }
                    element.style.setProperty('--nft-bg', bg);
                    element.classList.add('has-bg');
                    console.log(`✅ Background set for ${nft.NFTokenID}: ${bg}`);
                    
                    setTimeout(() => {
                        element.style.setProperty('--nft-bg', bg);
                        element.classList.add('has-bg');
                    }, 30);
                } else {
                    console.log(`ℹ️ No background found for ${nft.NFTokenID}`);
                }
            } catch (e) {
                console.error("Background error:", e);
            }
        }

        async function resolveNFTImageSources(nft) {
            const nftId = nft?.NFTokenID;
            if (!nftId) return [];
            if (metadataCache.has(nftId)) return metadataCache.get(nftId);

            const sources = [];
            const gateways = [
                "https://ipfs.io/ipfs/",
                "https://cloudflare-ipfs.com/ipfs/",
                "https://gateway.pinata.cloud/ipfs/",
                "https://dweb.link/ipfs/",
                "https://nftstorage.link/ipfs/"
            ];

            const meta = await fetchFullNFTMetadata(nftId);
            if (meta && meta.image) {
                let img = meta.image;
                if (img.startsWith('ipfs://')) img = img.replace('ipfs://', '');
                if (img.startsWith('Qm') || img.startsWith('bafy')) {
                    gateways.forEach(g => sources.push(g + img));
                } else if (img.startsWith('http')) {
                    sources.push(img);
                }
            }

            const raced = await raceMetadataProviders(nftId);
            if (raced) {
                let url = raced;
                if (url.startsWith('ipfs://')) url = url.replace('ipfs://', '');
                if (url.startsWith('Qm') || url.startsWith('bafy')) {
                    gateways.forEach(g => sources.push(g + url));
                } else if (url.startsWith('http')) {
                    sources.push(url);
                }
            }

            const unique = [...new Set(sources.filter(Boolean))];
            metadataCache.set(nftId, unique);
            console.log(`Sources for ${nftId}:`, unique.length ? unique : "none");
            return unique;
        }

        // (All other functions — fetchFullNFTMetadata with 3 endpoints, raceMetadataProviders, loadNFTs, renderNFTGallery, loadImageForCard with onerror fallback, etc. — are the same robust versions.)

        let allNFTs = [];
        let selectedNFTs = [];
        let metadataCache = new Map();

        async function fetchFullNFTMetadata(nftId) {
            const endpoints = [
                `https://api.xrpscan.com/api/v1/nft/${nftId}`,
                `https://bithomp.com/api/v2/nft/${nftId}`,
                `https://xrplmeta.org/api/v1/nft/${nftId}`
            ];
            for (const url of endpoints) {
                try {
                    const res = await fetch(url);
                    if (res.ok) {
                        const data = await res.json();
                        return data.meta || data || {};
                    }
                } catch (e) {}
            }
            return {};
        }

        // ... (rest of the functions exactly as in the last version I gave you)

        async function updateGridPreview() {
            const grid = document.getElementById('grid-preview');
            const rows = parseInt(document.getElementById('rows-slider').value);
            const cols = parseInt(document.getElementById('cols-slider').value);
            document.getElementById('cols-value').textContent = cols;
            document.getElementById('rows-value').textContent = rows;

            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

            const nftsToShow = selectedNFTs.slice(0, rows * cols);
            for (const nft of nftsToShow) {
                const cell = document.createElement('div');
                cell.className = `grid-cell border border-slate-600 overflow-hidden relative`;
                const wrap = document.createElement('div');
                wrap.className = 'w-full h-full';
                cell.appendChild(wrap);

                await applyNFTBackgroundColor(nft, cell);   // now properly awaited

                resolveNFTImageSources(nft).then(sources => {
                    if (sources.length > 0) {
                        const img = new Image();
                        img.className = 'w-full h-full object-cover';
                        img.crossOrigin = 'anonymous';
                        img.src = sources[0];
                        wrap.appendChild(img);
                    }
                });
                grid.appendChild(cell);
            }
        }

        // (All the rest of the code — loadNFTs, toggleSelection, etc. — is unchanged from your repo + previous fixes)

        window.onload = () => {
            // same initialization as before
        };
    </script>
</body>
</html>
