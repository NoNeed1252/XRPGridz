    <script>
        let allNFTs = [];
        let selectedNFTs = [];
        let currentWallet = '';
        let currentMarker = null;
        const metadataCache = new Map();
        const collectionNameCache = new Map();
        let isLoadingMore = false;
        
        // --- Throttling / Request Queueing ---
        const requestQueue = [];
        let activeRequests = 0;
        const MAX_PARALLEL = 5;

        async function queuedRequest(task) {
            return new Promise((resolve, reject) => {
                const execute = async () => {
                    activeRequests++;
                    try { resolve(await task()); }
                    catch (e) { reject(e); }
                    finally {
                        activeRequests--;
                        if (requestQueue.length > 0) requestQueue.shift()();
                    }
                };
                if (activeRequests < MAX_PARALLEL) execute();
                else requestQueue.push(execute);
            });
        }

        async function raceMetadataProviders(nftId) {
            const controller = new AbortController();
            const providers = [
                () => fetch(`https://api.xrpscan.com/api/v1/nft/${nftId}`, { signal: controller.signal }).then(r => r.json().then(d => d.meta?.image)),
                () => fetch(`https://xrplmeta.org/api/v1/nft/${nftId}`, { signal: controller.signal }).then(r => r.json().then(d => d.image)),
                () => fetch(`https://bithomp.com/api/v2/nft/${nftId}`, { signal: controller.signal }).then(r => r.json().then(d => d.image))
            ];

            try {
                const firstResult = await Promise.any(providers.map(p => p().then(img => {
                    if (img) { controller.abort(); return img; }
                    throw new Error('no image');
                })));
                return firstResult;
            } catch (e) { return null; }
        }

        async function resolveNFTImageSources(nft) {
            const sources = [];
            if (!nft?.NFTokenID) return sources;
            if (nft.URI) sources.push(`/api/proxy?hex=${nft.URI}`);
            const racedImage = await queuedRequest(() => raceMetadataProviders(nft.NFTokenID));
            if (racedImage) {
                const url = racedImage.startsWith('ipfs://') ? `https://ipfs.io/ipfs/${racedImage.replace('ipfs://', '')}` : racedImage;
                sources.push(`/api/proxy?url=${encodeURIComponent(url)}`);
            }
            let rawUri = nft.URI || '';
            if (/^[0-9A-Fa-f]{20,}$/.test(rawUri)) rawUri = hexToString(rawUri);
            if (rawUri) {
                const cid = extractCID(rawUri);
                if (cid) {
                    sources.push(`/api/proxy?cid=${cid}`);
                    sources.push(`https://ipfs-proxy.xrp.cafe/ipfs/${cid}`);
                }
            }
            return [...new Set(sources)];
        }

        function extractCID(uri) {
            if (!uri) return null;
            if (uri.startsWith('ipfs://')) return uri.replace('ipfs://', '');
            if (uri.includes('ipfs/')) return uri.split('ipfs/').pop();
            if (uri.match(/^[a-zA-Z0-9]{46,59}$/)) return uri;
            return null;
        }

        function hexToString(hex) {
            let str = '';
            for (let i = 0; i < hex.length; i += 2) str += String.fromCharCode(parseInt(hex.substr(i, 2), 16));
            return str;
        }

        async function loadNFTsFromXRPL(address, marker = null) {
            const params = [{ account: address, ledger_index: "validated", limit: 200 }];
            if (marker) params[0].marker = marker;
            const res = await fetch('https://xrplcluster.com', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ method: "account_nfts", params })
            });
            const data = await res.json();
            return { nfts: data.result?.account_nfts || [], marker: data.result?.marker || null };
        }

        async function loadAllNFTs(address) {
            let loaded = []; let marker = null; const MAX = 1200;
            do {
                const result = await loadNFTsFromXRPL(address, marker);
                loaded = loaded.concat(result.nfts);
                marker = result.marker;
                if (document.getElementById('nft-count')) document.getElementById('nft-count').textContent = loaded.length;
                if (loaded.length >= MAX) break;
            } while (marker);
            currentMarker = marker;
            return loaded;
        }

        async function loadNFTs() {
            const address = document.getElementById('wallet-input').value.trim();
            if (!address) return alert('Please enter a wallet address');
            const statusEl = document.getElementById('wallet-status');
            showStatus(statusEl, 'Syncing Wallet...', 'loading');
            
            try {
                const nfts = await loadAllNFTs(address);
                allNFTs = nfts;
                currentWallet = address;
                selectedNFTs = [];
                document.getElementById('nft-gallery-section').classList.remove('hidden');
                document.getElementById('grid-config-section').classList.remove('hidden');
                renderNFTGallery();
                if (currentMarker) document.getElementById('load-more-btn').classList.remove('hidden');
                selectedNFTs = allNFTs.slice(0, 16);
                updateSelectedCount();
                setTimeout(() => setGridPreset(4, 4), 600);
                showStatus(statusEl, `Found ${allNFTs.length} NFTs`, 'success');
            } catch (e) { showStatus(statusEl, 'Error loading NFTs.', 'error'); }
        }

        const galleryObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const card = entry.target;
                    const nftId = card.dataset.nftid;
                    const index = card.dataset.index;
                    if (!card.dataset.loaded) {
                        card.dataset.loaded = "true";
                        const nft = allNFTs.find(n => n.NFTokenID === nftId);
                        if (nft) loadImageForCard(nft, index, card);
                    }
                }
            });
        }, { root: document.getElementById('nft-grid'), rootMargin: '100px' });

        function renderNFTGallery(filtered = null) {
            const container = document.getElementById('nft-grid');
            container.innerHTML = '';
            const list = filtered || allNFTs;
            list.forEach((nft, i) => {
                const isSelected = selectedNFTs.some(s => s.NFTokenID === nft.NFTokenID);
                const card = document.createElement('div');
                card.className = `nft-card bg-[#0a0f1e] border ${isSelected ? 'border-blue-500 selected' : 'border-slate-700'} rounded-3xl overflow-hidden cursor-pointer`;
                card.dataset.index = i;
                card.dataset.nftid = nft.NFTokenID;
                card.innerHTML = `
                    <div class="relative aspect-square bg-slate-900">
                        <div class="absolute inset-0 loading-skeleton flex items-center justify-center" id="skel-${i}"><i class="fa-solid fa-image text-3xl text-slate-700"></i></div>
                        <div id="imgwrap-${i}" class="w-full h-full hidden"></div>
                        <div class="absolute top-3 right-3"><div class="w-6 h-6 rounded-2xl flex items-center justify-center ${isSelected ? 'bg-blue-600' : 'bg-black/70'}"><i class="fa-solid ${isSelected ? 'fa-check text-white' : 'fa-plus text-white/70'} text-xs"></i></div></div>
                    </div>`;
                card.onclick = () => toggleSelection(nft, card);
                container.appendChild(card);
                galleryObserver.observe(card);
            });
        }

        async function loadImageForCard(nft, index, card) {
            const skel = document.getElementById(`skel-${index}`);
            const wrap = document.getElementById(`imgwrap-${index}`);
            const sources = await resolveNFTImageSources(nft);
            if (skel) skel.style.display = 'none';
            if (wrap) {
                wrap.style.display = 'block';
                if (!sources.length) { wrap.innerHTML = createPlaceholder(nft.NFTokenID); return; }
                const img = document.createElement('img');
                img.className = 'w-full h-full object-cover';
                img.crossOrigin = "anonymous";
                let tryIdx = 0;
                img.onerror = () => { tryIdx++; if (tryIdx < sources.length) img.src = sources[tryIdx]; else wrap.innerHTML = createPlaceholder(nft.NFTokenID); };
                img.src = sources[0];
                wrap.appendChild(img);
            }
        }

        function toggleSelection(nft, card) {
            const idx = selectedNFTs.findIndex(s => s.NFTokenID === nft.NFTokenID);
            if (idx > -1) {
                selectedNFTs.splice(idx, 1);
                card.classList.remove('selected', 'border-blue-500');
                card.classList.add('border-slate-700');
            } else {
                if (selectedNFTs.length >= 100) return alert('Max 100 NFTs');
                selectedNFTs.push(nft);
                card.classList.add('selected', 'border-blue-500');
                card.classList.remove('border-slate-700');
            }
            updateSelectedCount(); updateGridPreview();
        }

        function updateGridPreview() {
            const grid = document.getElementById('grid-preview');
            const rows = parseInt(document.getElementById('rows-slider').value);
            const cols = parseInt(document.getElementById('cols-slider').value);
            
            // Sync labels
            document.getElementById('cols-value').textContent = cols;
            document.getElementById('rows-value').textContent = rows;

            if (!selectedNFTs.length) { grid.innerHTML = ''; return; }
            grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            grid.innerHTML = '';
            selectedNFTs.slice(0, rows * cols).forEach(nft => {
                const cell = document.createElement('div');
                cell.className = `grid-cell rounded-2xl border border-slate-600 overflow-hidden relative group`;
                const wrap = document.createElement('div');
                wrap.className = 'w-full h-full bg-[#1e2937]';
                cell.appendChild(wrap);
                resolveNFTImageSources(nft).then(sources => {
                    if (sources.length > 0) {
                        const img = document.createElement('img');
                        img.className = 'w-full h-full object-cover';
                        img.crossOrigin = 'anonymous';
                        let currentTry = 0;
                        img.onerror = () => { currentTry++; if (currentTry < sources.length) img.src = sources[currentTry]; };
                        img.src = sources[0];
                        wrap.appendChild(img);
                    }
                });
                grid.appendChild(cell);
            });
        }

        async function downloadGridPNG(isXFormat = false) {
            const wrapper = document.getElementById('grid-preview');
            if (!wrapper.children.length) return alert('Build a grid first!');
            const position = document.getElementById('banner-position').value;
            
            try {
                // 1. Capture the initial grid
                const gridCanvas = await html2canvas(wrapper, { 
                    scale: 3, 
                    backgroundColor: '#0f172a', 
                    useCORS: true, 
                    logging: false 
                });

                // 2. Load Logo Image
                const logoImg = new Image();
                logoImg.crossOrigin = 'anonymous';
                logoImg.src = '/api/proxy?url=' + encodeURIComponent('https://storage.googleapis.com/interaction-media-bucket/a0718422-582f-468c-a0c2-44452572707f/4e981d41-b8a2-5040-b22e-bfa12613b472');

                await new Promise((resolve) => {
                    logoImg.onload = resolve;
                    logoImg.onerror = () => { console.warn('Logo failed to load'); resolve(); };
                });

                let finalCanvasWidth, finalCanvasHeight;
                let gridX, gridY, bannerX, bannerY, bannerW, bannerH;
                const bannerThickness = gridCanvas.height * 0.12;

                if (isXFormat) {
                    // Logic for 16:9 X Canvas
                    finalCanvasWidth = gridCanvas.width;
                    finalCanvasHeight = (gridCanvas.width * 9) / 16;
                    
                    if (finalCanvasHeight < gridCanvas.height + bannerThickness) {
                        finalCanvasHeight = gridCanvas.height + bannerThickness;
                        finalCanvasWidth = (finalCanvasHeight * 16) / 9;
                    }

                    gridX = (finalCanvasWidth - gridCanvas.width) / 2;
                    gridY = (finalCanvasHeight - (gridCanvas.height + bannerThickness)) / 2;
                    bannerX = 0;
                    bannerY = gridY + gridCanvas.height;
                    bannerW = finalCanvasWidth;
                    bannerH = bannerThickness;
                } else {
                    // Original Square Logic
                    finalCanvasWidth = gridCanvas.width;
                    finalCanvasHeight = gridCanvas.height;
                    gridX = 0; gridY = 0;
                    bannerX = 0; bannerY = 0; bannerW = finalCanvasWidth; bannerH = bannerThickness;

                    if (position === 'top') {
                        finalCanvasHeight += bannerThickness;
                        gridY = bannerThickness;
                        bannerY = 0;
                    } else if (position === 'bottom') {
                        finalCanvasHeight += bannerThickness;
                        gridY = 0;
                        bannerY = gridCanvas.height;
                    } else if (position === 'left') {
                        finalCanvasWidth += bannerThickness;
                        gridX = bannerThickness;
                        bannerW = bannerThickness;
                        bannerH = gridCanvas.height;
                        bannerX = 0; bannerY = 0;
                    } else if (position === 'right') {
                        finalCanvasWidth += bannerThickness;
                        gridX = 0;
                        bannerW = bannerThickness;
                        bannerH = gridCanvas.height;
                        bannerX = gridCanvas.width;
                        bannerY = 0;
                    }
                }

                const finalCanvas = document.createElement('canvas');
                finalCanvas.width = finalCanvasWidth;
                finalCanvas.height = finalCanvasHeight;
                const ctx = finalCanvas.getContext('2d');

                // Fill background and draw grid
                ctx.fillStyle = '#0f172a';
                ctx.fillRect(0, 0, finalCanvasWidth, finalCanvasHeight);
                ctx.drawImage(gridCanvas, gridX, gridY);

                // Draw solid banner
                ctx.fillStyle = '#0a0f1e';
                ctx.fillRect(bannerX, bannerY, bannerW, bannerH);

                // Draw branding content
                ctx.save();
                let centerX = bannerX + bannerW / 2;
                let centerY = bannerY + bannerH / 2;
                
                if (!isXFormat && (position === 'left' || position === 'right')) {
                    ctx.translate(centerX, centerY);
                    ctx.rotate(-Math.PI / 2);
                    ctx.translate(-centerX, -centerY);
                }

                ctx.font = `bold ${Math.floor(bannerThickness * 0.4)}px system-ui, sans-serif`;
                const text = "XRPGridz";
                const textMetrics = ctx.measureText(text);
                const logoSize = bannerThickness * 0.6;
                const logoAvailable = logoImg.complete && logoImg.naturalWidth > 0;
                const spacing = finalCanvasWidth * 0.02;
                const contentWidth = (logoAvailable ? logoSize : 0) + (logoAvailable ? spacing : 0) + textMetrics.width;

                let startX = centerX - contentWidth / 2;
                if (logoAvailable) {
                    ctx.drawImage(logoImg, startX, centerY - logoSize / 2, logoSize, logoSize);
                    startX += logoSize + spacing;
                }

                ctx.fillStyle = '#ffffff';
                ctx.textBaseline = 'middle';
                ctx.fillText(text, startX, centerY);
                ctx.restore();

                // Trigger download
                const a = document.createElement('a');
                a.download = `xrpgridz-${isXFormat ? 'x-' : ''}${new Date().getTime()}.png`;
                a.href = finalCanvas.toDataURL('image/png'); 
                a.click();
            } catch (e) { 
                console.error(e);
                alert('Download failed. Try refreshing.'); 
            }
        }

        function updateSelectedCount() { 
            document.getElementById('selected-count').textContent = selectedNFTs.length; 
        }

        function setGridPreset(r, c) { 
            document.getElementById('rows-slider').value = r; 
            document.getElementById('cols-slider').value = c; 
            updateGridPreview(); 
        }

        function clearSelected() { 
            selectedNFTs = []; 
            renderNFTGallery(); 
            updateSelectedCount(); 
            updateGridPreview(); 
        }

        function selectAllNFTs() { 
            selectedNFTs = [...allNFTs].slice(0, 100); 
            renderNFTGallery(); 
            updateSelectedCount(); 
            updateGridPreview(); 
        }

        function deselectAllNFTs() { 
            clearSelected(); 
        }

        function showStatus(el, msg, type) { 
            el.innerHTML = msg; 
            el.className = `mt-2 text-sm px-4 py-2 rounded-2xl ${type === 'error' ? 'bg-red-950/60 text-red-400' : 'bg-blue-950/60 text-blue-400'}`; 
            el.classList.remove('hidden'); 
        }

        function createPlaceholder(id) { 
            return `<div class="flex items-center justify-center h-full bg-slate-800 text-[10px] text-slate-500 font-mono p-2 text-center">No Image Found<br>${id.slice(0,6)}</div>`; 
        }

        function shuffleSelected() {
            for (let i = selectedNFTs.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [selectedNFTs[i], selectedNFTs[j]] = [selectedNFTs[j], selectedNFTs[i]];
            }
            updateGridPreview();
        }

        const DONATE_ADDRESS = 'rP1wMvanhfmsm7Af4FcHvSvfhash43LWSY';
        function showDonateModal() {
            const modal = document.createElement('div');
            modal.className = `fixed inset-0 bg-[#0a0f1e] flex items-center justify-center z-[100] p-4`;
            modal.innerHTML = `
                <div class="glass border border-white/10 rounded-3xl max-w-md w-full p-8 relative" onclick="event.target === this && this.remove()">
                    <button onclick="this.closest('.fixed').remove()" class="absolute top-5 right-5 text-2xl">×</button>
                    <div class="text-center">
                        <div class="mx-auto w-16 h-16 bg-gradient-to-br from-emerald-400 to-teal-500 rounded-2xl flex items-center justify-center mb-5"><i class="fa-solid fa-heart text-white text-4xl"></i></div>
                        <h3 class="text-3xl font-semibold mb-2">Support XRPGridz</h3>
                        <p class="text-slate-400 mb-6">Thank you for keeping this tool free.</p>
                        <div class="bg-[#0a0f1e] border border-white/10 rounded-2xl p-5 mb-5">
                            <div class="text-xs text-emerald-400 mb-1">TREASURY WALLET</div>
                            <div class="font-mono text-lg break-all mb-3">${DONATE_ADDRESS}</div>
                            <button onclick="navigator.clipboard.writeText('${DONATE_ADDRESS}'); this.innerHTML='Copied! Thank you ❤️'" class="w-full py-3 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-semibold">Copy Address</button>
                        </div>
                    </div>
                </div>`;
            document.body.appendChild(modal);
        }

        window.onload = () => { 
            document.getElementById('rows-slider').oninput = updateGridPreview;
            document.getElementById('cols-slider').oninput = updateGridPreview;
        };
    </script>
</body>
</html>
